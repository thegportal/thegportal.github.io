<!DOCTYPE html>
<html>
<head>
<title>Load Flash</title>
</head>
<body>
<script src="ruffle/ruffle.js" onerror="if (this.src != 'https://thegportal.github.io/ghrb/ruffle/ruffle.js') {this.src='https://thegportal.github.io/ghrb/ruffle/ruffle.js'} else {this.src='https://unpkg.com/@ruffle-rs/ruffle'}"></script>
<div id="gameContainer"></div>

<script>
let gContain = document.getElementById('gameContainer');
const source = window.location.href.split('#')[1];
console.log(source);
const base64Data = source.split(',')[1];
const binaryString = window.atob(base64Data);
const len = binaryString.length;
const bytes = new Uint8Array(len);
for (let i = 0; i < len; i++) {
  bytes[i] = binaryString.charCodeAt(i);
}
const ruffle = window.RufflePlayer.newest();
const player = ruffle.createPlayer();
player.style.width = '640px';
player.style.height = '480px';
player.style.zIndex = '10';
player.style.position = 'absolute';
player.style.top = '0';
player.style.left = '0';
gContain.appendChild(player);
player.load({data: bytes});
</script>
</body>
</html>
