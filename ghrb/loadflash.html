<!DOCTYPE html>
<html>
<head>
<title>Load Flash</title>
</head>
<body>
<script src="ruffle/ruffle.js" onerror="if (this.src != 'https://thegportal.github.io/ghrb/ruffle/ruffle.js') {this.src='https://thegportal.github.io/ghrb/ruffle/ruffle.js'} else {this.src='https://unpkg.com/@ruffle-rs/ruffle'}"></script>
<input type="file" id="fileInput">
<div id="gameContainer"></div>

<script>
document.getElementById('fileInput').addEventListener('change', function(e) {
  const file = e.target.files[0];
  const url = URL.createObjectURL(file);

  const ruffle = window.RufflePlayer.newest();
  const player = ruffle.createPlayer();

  player.style.width = "800px";
  player.style.height = "600px";

  document.getElementById('gameContainer').innerHTML = "";
  document.getElementById('gameContainer').appendChild(player);

  player.load(url);
});
</script>
</body>
</html>
